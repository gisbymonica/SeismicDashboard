services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: seismic
      POSTGRES_USER: seismic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seismic -d seismic"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
      - ./backend/models:/app/models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgis_data:


